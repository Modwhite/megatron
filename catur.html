<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tactical Chess | MEGATRON</title>
    <style>
        body {
            background: #050b18;
            color: #00eaff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }

        header {
            font-size: clamp(18px, 5vw, 24px);
            font-weight: bold;
            text-transform: uppercase;
            margin: 15px 0;
            letter-spacing: 2px;
            color: #00eaff;
        }

        /* Container untuk Lichess Frame */
        .chess-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: auto;
            background: #0d1a2b;
            border: 2px solid #1e90ff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 234, 255, 0.2);
            overflow: hidden;
        }

        /* Iframe Lichess */
        iframe {
            width: 100%;
            height: 500px; /* Saiz yang selesa untuk mobile & desktop */
            border: none;
        }

        .btn-back {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            color: #00eaff;
            text-decoration: none;
            border: 1px solid #00eaff;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
            background: rgba(0, 234, 255, 0.05);
        }

        .btn-back:hover {
            background: #00eaff;
            color: #050b18;
            box-shadow: 0 0 15px #00eaff;
        }

        .alert-mini {
            font-size: 12px;
            color: #ff4444;
            margin-top: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <header>MEGATRON AI TACTICAL CHESS</header>
    
    <div class="chess-wrapper">
        <iframe 
            src="https://lichess.org/export/embed.html?theme=auto&bg=dark" 
            allowtransparency="true">
        </iframe>
    </div>

    <div class="alert-mini">INTEGRATED VIA LICHESS OPEN SOURCE ENGINE</div>

    <a href="index.html" class="btn-back">← KEMBALI KE COMMAND CENTER</a>

</body>
</html>
