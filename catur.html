<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Simulasi Catur AI - MEGATRON</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: #050b18; /* Warna latar gelap Megatron */
            color: #00eaff; /* Warna teks neon */
            padding: 40px 20px; 
            margin: 0;
        }
        h2 { text-transform: uppercase; letter-spacing: 2px; }
        #myBoard { width: 400px; margin-bottom: 20px; box-shadow: 0 0 20px #00eaff66; border-radius: 5px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;}
        select, button { 
            padding: 10px 15px; 
            font-size: 14px; 
            cursor: pointer; 
            background: #0d1a2b; 
            color: #00eaff; 
            border: 1px solid #00eaff; 
            border-radius: 5px; 
            font-weight: bold;
        }
        select:hover, button:hover { background: #00eaff; color: #050b18; }
        #status { font-weight: bold; margin-bottom: 15px; font-size: 18px; color: #ff4444; }
        .back-btn { margin-top: 30px; text-decoration: none; color: #aaa; font-size: 14px; }
        .back-btn:hover { color: #fff; }
    </style>
</head>
<body>

    <h2>Simulasi Taktikal Catur</h2>
    
    <div class="controls">
        <select id="gameMode">
            <option value="2p">2 Pemain Fizikal</option>
            <option value="ai">Lawan AI (Komputer)</option>
        </select>
        <select id="aiLevel">
            <option value="5">Tahap Pertengahan</option>
            <option value="10">Tahap Mahir</option>
            <option value="20">Tahap Grandmaster</option>
        </select>
        <button onclick="startNewGame()">Mula Semula</button>
    </div>

    <div id="status">Sistem Sedia: Giliran Putih</div>
    
    <div id="myBoard"></div>

    <a href="index.html" class="back-btn">← Kembali ke Command Center</a>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var stockfish = null;
        var $status = $('#status');

        // Melukis papan catur DAHULU supaya ia tidak diganggu oleh proses pemuatan AI
        var config = { 
            draggable: true, 
            position: 'start', 
            onDragStart: onDragStart, 
            onDrop: onDrop, 
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        board = Chessboard('myBoard', config);
        updateStatus();
        
        // Trik memuatkan AI (Web Worker) untuk mengelakkan sekatan keselamatan pelayar web
        fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.0/stockfish.js')
            .then(response => response.text())
            .then(text => {
                var blob = new Blob([text], {type: 'application/javascript'});
                var workerUrl = URL.createObjectURL(blob);
                stockfish = new Worker(workerUrl);
                stockfish.postMessage('uci');
                
                stockfish.onmessage = function(event) {
                    var line = event.data;
                    if (line && line.indexOf('bestmove') > -1) {
                        var match = line.match(/^bestmove ([a-h][1-8])([a-h][1-8])([qrbn])?/);
                        if (match) {
                            game.move({ from: match[1], to: match[2], promotion: match[3] });
                            board.position(game.fen());
                            updateStatus();
                        }
                    }
                };
            })
            .catch(err => console.error("Gagal memuatkan AI: ", err));

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if (piece.search(/^b/) !== -1 && $('#gameMode').val() === 'ai') return false; 
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            
            updateStatus();

            if ($('#gameMode').val() === 'ai' && !game.game_over()) {
                window.setTimeout(makeRandomMove, 250);
            }
        }

        function makeRandomMove () {
            if (!stockfish) return; // Jika AI belum sedia, tunggu sekejap
            var skillLevel = $('#aiLevel').val();
            var fen = game.fen();
            
            stockfish.postMessage('setoption name Skill Level value ' + skillLevel);
            stockfish.postMessage('position fen ' + fen);
            stockfish.postMessage('go depth 10'); 
        }

        function onSnapEnd () { board.position(game.fen()); }

        function updateStatus () {
            var statusHTML = '';
            var moveColor = (game.turn() === 'w') ? 'Putih' : 'Hitam';
            
            if (game.in_checkmate()) statusHTML = 'AMARAN: ' + moveColor + ' Tewas (Checkmate).';
            else if (game.in_draw()) statusHTML = 'STATUS: Seri (Draw).';
            else {
                statusHTML = 'Giliran: ' + moveColor;
                if (game.in_check()) statusHTML += ' | AMARAN: Check!';
            }
            $status.html(statusHTML);
        }

        function startNewGame() {
            game.reset();
            board.start();
            updateStatus();
        }
    </script>
</body>
</html>
