<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Master Catur Web</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f4f9; padding: 20px; }
        #myBoard { width: 400px; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        select, button { padding: 10px; font-size: 16px; cursor: pointer; }
        #status { font-weight: bold; margin-bottom: 10px; color: #333; }
    </style>
</head>
<body>

    <h2>Latihan Catur AI</h2>
    
    <div class="controls">
        <select id="gameMode">
            <option value="2p">2 Pemain Fizikal</option>
            <option value="ai">Lawan AI (Komputer)</option>
        </select>
        <select id="aiLevel">
            <option value="5">Tahap Pertengahan (Intermediate)</option>
            <option value="10">Tahap Mahir (Advanced)</option>
            <option value="20">Tahap Grandmaster</option>
        </select>
        <button onclick="startNewGame()">Mula Permainan Baru</button>
    </div>

    <div id="status">Giliran Putih</div>
    <div id="myBoard"></div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.0/stockfish.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.0/stockfish.js');
        var $status = $('#status');
        
        // Tetapkan enjin AI
        stockfish.postMessage('uci');

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if (piece.search(/^b/) !== -1 && $('#gameMode').val() === 'ai') return false; // Elak gerak buah AI
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            
            updateStatus();

            if ($('#gameMode').val() === 'ai' && !game.game_over()) {
                window.setTimeout(makeRandomMove, 250); // Panggil AI untuk berfikir
            }
        }

        function makeRandomMove () {
            var skillLevel = $('#aiLevel').val();
            var fen = game.fen();
            
            // Arahkan Stockfish untuk mencari langkah terbaik berdasarkan tahap
            stockfish.postMessage('setoption name Skill Level value ' + skillLevel);
            stockfish.postMessage('position fen ' + fen);
            stockfish.postMessage('go depth 10'); // Cari sedalam 10 langkah (Boleh dilaras)
        }

        // Menerima langkah dari Stockfish
        stockfish.onmessage = function(event) {
            var line = event.data;
            if (line && line.indexOf('bestmove') > -1) {
                var match = line.match(/^bestmove ([a-h][1-8])([a-h][1-8])([qrbn])?/);
                if (match) {
                    game.move({ from: match[1], to: match[2], promotion: match[3] });
                    board.position(game.fen());
                    updateStatus();
                }
            }
        };

        function onSnapEnd () { board.position(game.fen()); }

        function updateStatus () {
            var statusHTML = '';
            var moveColor = (game.turn() === 'w') ? 'Putih' : 'Hitam';
            
            if (game.in_checkmate()) statusHTML = 'Game over, ' + moveColor + ' tewas (Checkmate).';
            else if (game.in_draw()) statusHTML = 'Game over, seri (Draw).';
            else {
                statusHTML = 'Giliran ' + moveColor;
                if (game.in_check()) statusHTML += ', ' + moveColor + ' dalam keadaan Check!';
            }
            $status.html(statusHTML);
        }

        function startNewGame() {
            game.reset();
            board.start();
            updateStatus();
        }

        var config = { draggable: true, position: 'start', onDragStart: onDragStart, onDrop: onDrop, onSnapEnd: onSnapEnd };
        board = Chessboard('myBoard', config);
        updateStatus();
    </script>
</body>
</html>
