<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Tactical Catur | MEGATRON</title>
    <style>
        body {
            background: #050b18;
            color: #00eaff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 10px;
        }

        header {
            font-size: clamp(18px, 5vw, 26px);
            font-weight: bold;
            text-transform: uppercase;
            margin: 15px 0;
            letter-spacing: 2px;
        }

        .status-box {
            background: #0d1a2b;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: inline-block;
            border: 1px solid #1e90ff;
        }

        #status {
            font-weight: bold;
            text-transform: uppercase;
            color: #fff;
        }

        .chess-container {
            display: flex;
            justify-content: center;
            margin: 10px auto;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 92vw;
            height: 92vw;
            max-width: 400px;
            max-height: 400px;
            border: 4px solid #00eaff;
            box-shadow: 0 0 20px #00eaff44;
        }

        .square {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(24px, 8vw, 36px);
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .white-sq { background-color: #f0d9b5; color: #000; }
        .black-sq { background-color: #b58863; color: #000; }

        .selected {
            background-color: #39ff14 !important; /* Hijau Neon bila dipilih */
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .btn-back {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;
            color: #00eaff;
            text-decoration: none;
            border: 1px solid #00eaff;
            border-radius: 5px;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #00eaff;
            color: #050b18;
        }
    </style>
</head>
<body>

    <header>Simulasi Tactical Catur</header>
    
    <div class="status-box">
        <span id="status">Giliran: PUTIH</span>
    </div>

    <div class="chess-container">
        <div id="board" class="board"></div>
    </div>

    <a href="index.html" class="btn-back">← Kembali ke Command Center</a>

    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        
        // Simbol Catur
        const whitePieces = ['♙','♖','♘','♗','♕','♔'];
        const blackPieces = ['♟','♜','♞','♝','♛','♚'];

        let boardLayout = [
            ['♜','♞','♝','♛','♚','♝','♞','♜'],
            ['♟','♟','♟','♟','♟','♟','♟','♟'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['♙','♙','♙','♙','♙','♙','♙','♙'],
            ['♖','♘','♗','♕','♔','♗','♘','♖']
        ];

        let selectedSquare = null;
        let isWhiteTurn = true;

        function createBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    square.classList.add('square');
                    square.classList.add((r + c) % 2 === 0 ? 'white-sq' : 'black-sq');
                    square.innerText = boardLayout[r][c];
                    
                    if (selectedSquare && selectedSquare.r === r && selectedSquare.c === c) {
                        square.classList.add('selected');
                    }

                    square.onclick = () => handleSquareClick(r, c);
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(r, c) {
            const piece = boardLayout[r][c];

            // JIKA BELUM PILIH BUAH
            if (!selectedSquare) {
                if (piece === '') return; // Klik petak kosong, abaikan

                // LOGIK GILIRAN: Semak adakah buah yang diklik milik pemain sekarang
                const isWhitePiece = whitePieces.includes(piece);
                if (isWhiteTurn && !isWhitePiece) {
                    alert("Sekarang giliran PUTIH!");
                    return;
                }
                if (!isWhiteTurn && isWhitePiece) {
                    alert("Sekarang giliran HITAM!");
                    return;
                }

                selectedSquare = { r, c };
                createBoard();
            } 
            // JIKA SUDAH PILIH BUAH (GERAK)
            else {
                const prevR = selectedSquare.r;
                const prevC = selectedSquare.c;

                // Batalkan pilihan jika klik petak sama
                if (prevR === r && prevC === c) {
                    selectedSquare = null;
                    createBoard();
                    return;
                }

                // Gerakkan buah ke lokasi baru
                boardLayout[r][c] = boardLayout[prevR][prevC];
                boardLayout[prevR][prevC] = '';
                
                selectedSquare = null;
                isWhiteTurn = !isWhiteTurn; // Tukar giliran
                
                // Update UI Status
                statusElement.innerText = `Giliran: ${isWhiteTurn ? 'PUTIH' : 'HITAM'}`;
                statusElement.style.color = isWhiteTurn ? '#fff' : '#ff4444';
                
                createBoard();
            }
        }

        createBoard();
    </script>
</body>
</html>
