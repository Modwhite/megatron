<!DOCTYPE html>

<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUCIX LITE v5</title>

<script src="https://unpkg.com/globe.gl"></script>

<style>
body {
  margin:0;
  background:#020408;
  color:#e8f4f0;
  font-family:monospace;
}

#loading {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

#status {
  color:#64f0c8;
  margin-top:10px;
}

#dashboard {
  display:none;
  padding:10px;
}

.container {
  display:flex;
  gap:10px;
}

.panel {
  border:1px solid rgba(100,240,200,0.2);
  padding:10px;
  margin:5px;
  background:rgba(0,0,0,0.3);
}

.left {width:20%;}

.center {
  width:60%;
  display:flex;
  justify-content:center;
}

.right {width:20%;}

h3 {
  color:#64f0c8;
  border-bottom:1px solid rgba(100,240,200,0.2);
  padding-bottom:5px;
}

#globe {
  height:300px;
  width:100%;
}

.feed-item {
  border-left:2px solid #64f0c8;
  padding-left:6px;
  margin-bottom:6px;
  font-size:12px;
}

.news-item {
  font-size:12px;
  margin-bottom:4px;
}

.blink {
  animation: blink 1s infinite;
}
@keyframes blink {
  50% {opacity:0.3;}
}
</style>

</head>

<body>

<div id="loading">
  <h2 class="blink">CRUCIX INITIALIZING...</h2>
  <p id="status">Connecting OSINT sources...</p>
</div>

<div id="dashboard">

  <div class="container">

```
<div class="left panel">
  <h3>SENSOR GRID</h3>
  <div id="metrics"></div>
</div>

<div class="center panel">
  <h3>WORLD MAP</h3>
  <div id="globe"></div>
</div>

<div class="right panel">
  <h3>OSINT FEED</h3>
  <div id="feed"></div>
</div>
```

  </div>

  <div class="panel">
    <h3>LIVE NEWS</h3>
    <div id="news"></div>
  </div>

</div>

<script>

/* DATA */
const metrics = {
  air: 120,
  thermal: 3200,
  conflict: 8,
  news: 25
};

const points = [
  { lat: 5.4, lng: 100.3, size: 0.02, color: "green" },
  { lat: 25.2, lng: 55.3, size: 0.03, color: "red" },
  { lat: 35.6, lng: 139.6, size: 0.02, color: "yellow" },
  { lat: 51.5, lng: -0.1, size: 0.02, color: "blue" },
  { lat: -6.2, lng: 106.8, size: 0.02, color: "green" }
];

const osintFeed = [
  "ISYARAT: Aktiviti udara meningkat di South China Sea",
  "ALERT: Missile strike dilaporkan di Middle East",
  "PERHATIAN: Pergerakan kapal meningkat di Selat Melaka",
  "INFO: Economic slowdown signal detected (FRED data)"
];

const newsTicker = [
  "[BERITA] Ekonomi global menunjukkan tanda kelembapan",
  "[BREAKING] Konflik meningkat di kawasan sempadan",
  "[INFO] Aktiviti perdagangan maritim meningkat",
  "[UPDATE] Polisi baharu memberi kesan kepada pasaran"
];

/* FUNCTION */
function loadDashboard(){

  const m = document.getElementById("metrics");
  m.innerHTML = `
    Air Activity: ${metrics.air}<br>
    Thermal: ${metrics.thermal}<br>
    Conflict: ${metrics.conflict}<br>
    News: ${metrics.news}
  `;

  // OSINT
  const f = document.getElementById("feed");
  f.innerHTML = "";

  osintFeed.forEach(item=>{
    const div = document.createElement("div");
    div.className = "feed-item";
    div.innerText = item;
    f.appendChild(div);
  });

  // NEWS ticker start
  startNewsTicker();

  // 🌍 GLOBE
  const globe = Globe()
    (document.getElementById('globe'))
    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
    .backgroundColor('#020408')
    .pointsData(points)
    .pointAltitude("size")
    .pointRadius(0.3)
    .pointColor("color");

  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.6;
  globe.pointOfView({ altitude: 2.5 });
}

/* NEWS TICKER */
function startNewsTicker(){
  const n = document.getElementById("news");
  let i = 0;

  setInterval(()=>{
    n.innerHTML = `<div class="news-item">${newsTicker[i]}</div>`;
    i = (i + 1) % newsTicker.length;
  }, 2000);
}

/* LOADING */
let statusText = [
  "Connecting OSINT sources...",
  "Processing intelligence feeds...",
  "Analyzing global signals...",
  "Finalizing dashboard..."
];

let i = 0;
let interval = setInterval(()=>{
  document.getElementById("status").innerText = statusText[i];
  i++;
  if(i >= statusText.length) clearInterval(interval);
},1000);

setTimeout(()=>{
  document.getElementById("loading").style.display="none";
  document.getElementById("dashboard").style.display="block";
  loadDashboard();
},3000);

</script>

</body>
</html>
